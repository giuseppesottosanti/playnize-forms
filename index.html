<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="pageTitle">Conferma Partecipazione</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            height: 100%;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
            min-height: 100%;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white;
            padding: 20px 16px;
            text-align: center;
        }
        .header .type {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
            margin-bottom: 6px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .header .date {
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 20px 16px 24px;
        }
        .greeting {
            text-align: center;
            margin-bottom: 20px;
        }
        .greeting .hello {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 2px;
        }
        .greeting .name {
            font-size: 22px;
            font-weight: 700;
            color: #1f2937;
        }
        .question {
            text-align: center;
            font-size: 16px;
            color: #374151;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px 24px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-yes {
            background: #22c55e;
        }
        .btn-maybe {
            background: #eab308;
        }
        .btn-no {
            background: #ef4444;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .hint {
            text-align: center;
            margin-top: 16px;
            padding: 12px;
            background: #f0fdf4;
            border-radius: 10px;
            font-size: 13px;
            color: #166534;
            line-height: 1.4;
        }

        /* Stato: invio in corso */
        .sending {
            text-align: center;
            padding: 20px;
            display: none;
        }
        .sending .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .sending p {
            color: #374151;
            font-size: 15px;
            font-weight: 500;
        }

        /* Stato: risposta confermata */
        .success {
            text-align: center;
            padding: 20px;
            display: none;
        }
        .success .check {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .success h2 {
            font-size: 20px;
            color: #166534;
            margin-bottom: 8px;
        }
        .success p {
            font-size: 14px;
            color: #6b7280;
        }

        /* Stato: errore (fallback WhatsApp) */
        .error-msg {
            text-align: center;
            margin-top: 12px;
            padding: 10px;
            background: #fef3c7;
            border-radius: 10px;
            font-size: 12px;
            color: #92400e;
            display: none;
        }

        .footer {
            text-align: center;
            padding: 12px;
            color: #9ca3af;
            font-size: 10px;
            border-top: 1px solid #f3f4f6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="type" id="activityType"></div>
            <h1 id="activityName">Caricamento...</h1>
            <div class="date" id="activityDate"></div>
        </div>
        
        <div class="content">
            <!-- FASE 1: Scelta risposta -->
            <div id="phaseChoice">
                <div class="greeting">
                    <div class="hello">Ciao</div>
                    <div class="name" id="memberName">...</div>
                </div>
                
                <div class="question">Partecipi?</div>
                
                <div class="buttons">
                    <button class="btn btn-yes" id="btnYes" onclick="sendResponse('YES')">✅ SÌ, PARTECIPO</button>
                    <button class="btn btn-maybe" id="btnMaybe" onclick="sendResponse('MAYBE')">🤔 FORSE</button>
                    <button class="btn btn-no" id="btnNo" onclick="sendResponse('NO')">❌ NO, NON POSSO</button>
                </div>
                
                <div class="hint">
                    ☝️ Clicca la tua risposta.<br>
                    La risposta verrà registrata automaticamente.
                </div>

                <div class="error-msg" id="errorMsg">
                    ⚠️ Connessione non riuscita. La risposta verrà inviata via WhatsApp.
                </div>
            </div>

            <!-- FASE 2: Invio in corso -->
            <div class="sending" id="phaseSending">
                <div class="spinner"></div>
                <p>Invio risposta...</p>
            </div>

            <!-- FASE 3: Conferma -->
            <div class="success" id="phaseSuccess">
                <div class="check" id="successIcon">✅</div>
                <h2 id="successTitle">Risposta registrata!</h2>
                <p id="successMessage">Grazie, la tua risposta è stata salvata.</p>
            </div>
        </div>
        
        <div class="footer">
            Playnize 🎵
        </div>
    </div>

    <script>
        // ================================================================
        //   CONFIGURAZIONE
        // ================================================================

        // URL dell'API Playnize
        // Locale: http://localhost:8000
        // Produzione: https://playnize-backend.onrender.com (o il tuo URL Render)
        const API_BASE_URL = "https://playnize-backend.onrender.com";

        // ================================================================
        //   PARAMETRI URL
        // ================================================================
        let params = {};

        function getParams() {
            const urlParams = new URLSearchParams(window.location.search);
            return {
                member: urlParams.get('m') || 'Membro',
                activity: urlParams.get('a') || 'Attività',
                activityType: urlParams.get('type') || '',
                date: urlParams.get('d') || '',
                phone: urlParams.get('p') || '',
                token: urlParams.get('t') || ''
            };
        }

        // ================================================================
        //   WHATSAPP (FALLBACK + CONFERMA)
        // ================================================================
        function buildWhatsAppUrl(response) {
            let emoji;
            if (response === 'YES') {
                emoji = '✅ SÌ';
            } else if (response === 'NO') {
                emoji = '❌ NO';
            } else {
                emoji = '🤔 FORSE';
            }

            let msg = `👤 ${params.member}\n`;
            msg += `🎵 ${params.activity}`;
            if (params.date) msg += ` - ${params.date}`;
            msg += `\n\n`;
            msg += `${emoji}\n`;
            msg += `⬆️ PREMI INVIA`;

            if (params.phone) {
                return `https://wa.me/${params.phone}?text=${encodeURIComponent(msg)}`;
            } else {
                return `https://wa.me/?text=${encodeURIComponent(msg)}`;
            }
        }

        // ================================================================
        //   INVIO RISPOSTA (API + WHATSAPP)
        // ================================================================
        async function sendResponse(response) {
            // Disabilita i bottoni
            document.getElementById('btnYes').disabled = true;
            document.getElementById('btnMaybe').disabled = true;
            document.getElementById('btnNo').disabled = true;

            // Mostra spinner
            document.getElementById('phaseChoice').style.display = 'none';
            document.getElementById('phaseSending').style.display = 'block';

            // URL WhatsApp (sempre pronto come fallback)
            const whatsappUrl = buildWhatsAppUrl(response);

            // Se non c'è token, vai direttamente a WhatsApp (modalità legacy)
            if (!params.token) {
                window.location.href = whatsappUrl;
                return;
            }

            // Chiama l'API
            try {
                const res = await fetch(`${API_BASE_URL}/api/forms/respond`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: params.token,
                        form_type: 'availability',
                        response: response,
                    }),
                });

                if (res.ok) {
                    // SUCCESSO: mostra conferma
                    const data = await res.json();
                    showSuccess(response);
                } else {
                    // Errore API: fallback a WhatsApp
                    console.error('API error:', res.status);
                    fallbackToWhatsApp(whatsappUrl);
                }
            } catch (err) {
                // Errore rete: fallback a WhatsApp
                console.error('Network error:', err);
                fallbackToWhatsApp(whatsappUrl);
            }
        }

        // ================================================================
        //   STATI DELL'INTERFACCIA
        // ================================================================

        function showSuccess(response) {
            document.getElementById('phaseSending').style.display = 'none';
            document.getElementById('phaseSuccess').style.display = 'block';

            if (response === 'YES') {
                document.getElementById('successIcon').textContent = '✅';
                document.getElementById('successTitle').textContent = 'Risposta: SÌ, PARTECIPO';
                document.getElementById('successMessage').textContent = 'La tua conferma è stata registrata. Grazie!';
            } else if (response === 'MAYBE') {
                document.getElementById('successIcon').textContent = '🤔';
                document.getElementById('successTitle').textContent = 'Risposta: FORSE';
                document.getElementById('successMessage').textContent = 'La tua risposta è stata registrata. Ti ricontatteremo.';
            } else {
                document.getElementById('successIcon').textContent = '❌';
                document.getElementById('successTitle').textContent = 'Risposta: NO, NON POSSO';
                document.getElementById('successMessage').textContent = 'La tua risposta è stata registrata. Grazie per avercelo fatto sapere.';
            }
        }

        function fallbackToWhatsApp(whatsappUrl) {
            // Mostra messaggio di errore brevemente, poi apri WhatsApp
            document.getElementById('phaseSending').style.display = 'none';
            document.getElementById('phaseChoice').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'block';

            // Riabilita i bottoni (ora come link WhatsApp diretti)
            document.getElementById('btnYes').disabled = false;
            document.getElementById('btnMaybe').disabled = false;
            document.getElementById('btnNo').disabled = false;

            // Dopo 1.5 secondi, apri WhatsApp
            setTimeout(() => {
                window.location.href = whatsappUrl;
            }, 1500);
        }

        // ================================================================
        //   INIZIALIZZAZIONE
        // ================================================================
        function init() {
            params = getParams();
            
            document.title = params.activity || 'Conferma Partecipazione';
            
            document.getElementById('activityType').textContent = params.activityType;
            document.getElementById('activityName').textContent = params.activity;
            document.getElementById('activityDate').textContent = params.date;
            document.getElementById('memberName').textContent = params.member;
            
            if (!params.activityType) {
                document.getElementById('activityType').style.display = 'none';
            }
        }

        init();
    </script>
</body>
</html>
